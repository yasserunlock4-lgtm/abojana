<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 أبو جنة × فوريو 🔥</title>

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <!-- ستايل -->
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      margin:0;
      font-family:'Cairo',sans-serif;
      background:linear-gradient(135deg,#12051f,#24113f);
      color:#fff;
      text-align:center;
    }

    .container{
      padding:20px;
      max-width:500px;
      margin:auto;
    }

    h1{
      color:#ffd54a;
      margin-bottom:10px;
    }

    .images{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0;
    }

    .images img{
      width:120px;
      border-radius:12px;
      box-shadow:0 10px 20px rgba(0,0,0,.4);
    }

    .balance{
      font-size:22px;
      margin:15px 0;
      background:rgba(255,255,255,.1);
      padding:10px;
      border-radius:10px;
    }

    button{
      padding:14px 20px;
      margin:10px;
      border:none;
      border-radius:12px;
      background:#ffd54a;
      color:#000;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(0,0,0,.3);
    }

    button:active{
      transform:scale(.95);
    }

    #result{
      margin-top:20px;
      font-size:20px;
      color:#00ffcc;
    }

    #tasks{
      margin-top:20px;
      background:rgba(255,255,255,.1);
      padding:15px;
      border-radius:12px;
    }

    a{
      color:#ffd54a;
      display:block;
      margin:5px;
      text-decoration:none;
    }

    #withdrawBtn{
      background:#00ff99;
      display:none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔥 أبو جنة × فوريو 🔥</h1>
  <p>لف واربح فلوس يومية 💰</p>

  <!-- الصور -->
  <div class="images">
    <img src="https://i.imgur.com/1X6ZQ6X.png" alt="أبو جنة">
    <img src="https://i.imgur.com/8Km9tLL.png" alt="مشروب الطاقة">
  </div>

  <!-- الرصيد -->
  <div class="balance">
    رصيدك: <span id="balance">0</span> دينار
  </div>

  <!-- زر اللعب -->
  <button id="spinBtn">🎰 لف العجلة</button>

  <!-- النتيجة -->
  <div id="result"></div>

  <!-- السحب -->
  <button id="withdrawBtn">
    💸 طلب سحب
  </button>

  <!-- المهام -->
  <div id="tasks"></div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- اللعبة -->
<script src="app.js"></script>

</body>
</html>
