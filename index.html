<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لعبة أبو جنة × فوريو VIP</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="w">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-left">
      <div class="badge"><div class="label">النتيجة</div><div class="value" id="scoreValue">0</div></div>
      <div class="badge"><div class="label">أفضل رقم</div><div class="value" id="bestValue">0</div></div>
    </div>
    <div class="hud-right">
      <div class="badge lives-badge"><div class="label">الأرواح</div><div class="value" id="livesHUD">❤️❤️❤️</div></div>
      <div class="badge goal-badge"><div class="label">هدف الفوز</div><div class="value" id="goalValue">20</div></div>
    </div>
  </div>

  <div class="multiplier-badge hidden" id="multiplierBadge">⚡ x2 نقاط!</div>
  <div class="tap-zone" id="tapZone"></div>

  <!-- باقي HTML نفس كودك 100% -->
  <!-- انسخه من ملفك بدون تغيير -->

</div>

<script src="app.js"></script>
</body>
</html>
