<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>🔥 أبو جنة × فوريو VIP</title>

<!-- Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- ستايل -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="app">

  <!-- 🔥 العنوان -->
  <h1>🔥 أبو جنة × فوريو VIP</h1>
  <p class="sub">اربح نقاط وطاقة ⚡ + جبس 🍟</p>

  <!-- 💰 معلومات -->
  <div class="stats">
    <div>💰 النقاط: <span id="coinsValue">0</span></div>
    <div>🎡 المحاولات: <span id="spinsValue">0</span></div>
  </div>

  <!-- ================= -->
  <!-- 🔥 نظام المهام -->
  <!-- ================= -->
  <div class="tasks-section">
    <h2>📋 أكمل المهام أولاً</h2>
    <div id="tasksBox"></div>
  </div>

  <!-- ================= -->
  <!-- 🎰 عجلة الحظ -->
  <!-- ================= -->
  <div class="wheel-section">

    <div class="wheel-container">
      <canvas id="wheelCanvas" width="360" height="360"></canvas>
    </div>

    <button id="spinBtn">🔥 لف العجلة</button>

    <div id="resultBox">جاهز للفوز؟</div>

  </div>

</div>

<!-- Firebase -->
<script type="module" src="firebase.js"></script>

<!-- App -->
<script type="module" src="app.js"></script>

</body>
</html>
