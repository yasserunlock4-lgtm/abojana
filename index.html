<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الدردشة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- شاشة اختيار الشخصية -->
    <div id="character-selection">
        <h1>اختر شخصية للتحدث معها</h1>
        <div class="characters-container">
            <!-- شخصية 1 -->
            <div class="character-card" data-character="ali">
                <img src="https://via.placeholder.com/150/30a9de/ffffff?text=علي" alt="شخصية علي">
                <h3>علي</h3>
            </div>
            <!-- شخصية 2 -->
            <div class="character-card" data-character="fatima">
                <img src="https://via.placeholder.com/150/e83e8c/ffffff?text=فاطمة" alt="شخصية فاطمة">
                <h3>فاطمة</h3>
            </div>
            <!-- شخصية 3 -->
            <div class="character-card" data-character="zainab">
                <img src="https://via.placeholder.com/150/ffc107/000000?text=زينب" alt="شخصية زينب">
                <h3>زينب</h3>
            </div>
        </div>
    </div>

    <!-- شاشة الدردشة (مخفية افتراضيًا ) -->
    <div id="chat-screen" class="hidden">
        <div class="chat-header">
            <button id="back-button">العودة</button>
            <h3 id="chat-character-name"></h3>
        </div>
        <div id="chat-box">
            <!-- الرسائل ستظهر هنا -->
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
            <button id="send-button">إرسال</button>
        </div>
    </div>

    <!-- نافذة الاشتراك المنبثقة (مخفية افتراضيًا) -->
    <div id="subscription-modal" class="hidden">
        <div class="modal-content">
            <h2>متابعة المحادثة!</h2>
            <p>لقد استهلكت رسائلك المجانية. للحصول على رسائل إضافية، يرجى الاشتراك في قنواتنا.</p>
            <div class="subscription-links">
                <a href="https://t.me/YOUR_TELEGRAM_CHANNEL" target="_blank" class="social-button telegram">الاشتراك في تليجرام</a>
                <a href="https://www.youtube.com/c/YOUR_YOUTUBE_CHANNEL" target="_blank" class="social-button youtube">الاشتراك في يوتيوب</a>
            </div>
            <button id="close-modal-button">لقد اشتركت، أكمل المحادثة</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
