<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لعبة أبو جنة × فوريو VIP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="w">
  <canvas id="gameCanvas"></canvas>
  
  <div class="hud">
    <div class="hud-left">
      <div class="badge"><div class="label">النتيجة</div><div class="value" id="scoreValue">0</div></div>
      <div class="badge"><div class="label">أفضل رقم</div><div class="value" id="bestValue">0</div></div>
    </div>
    <div class="hud-right">
      <div class="badge goal-badge"><div class="label">هدف الفوز</div><div class="value" id="goalValue">20</div></div>
    </div>
  </div>

  <div class="tap-zone" id="tapZone"></div>

  <div class="center-ui" id="startScreen">
    <div class="panel">
      <h1 class="title">لعبة أبو جنة × فوريو VIP</h1>
      <p class="sub">اجمع علب <strong>فوريو</strong>، وابتعد عن العوائق، ووصل لهدف الفوز.</p>
      
      <!-- منطقة عرض المحاولات والمؤقت -->
      <div class="attempts-box">
        <div id="attemptsDisplay" class="badge attempts-badge"><div class="label">المحاولات المتبقية</div><div class="value">3</div></div>
        <div id="timerDisplay" class="badge timer-badge hidden"><div class="label">الوقت المتبقي</div><div class="value">00:00</div></div>
      </div>

      <div class="buttons" style="margin-top:14px">
        <button class="primary" id="startBtn">ابدأ اللعب</button>
        <button class="reward" id="getAttemptsBtn">احصل على محاولات</button>
        <div class="button-row">
          <button class="telegram" onclick="window.open('https://t.me/YOUR_CHANNEL', '_blank' )">فتح القناة</button>
          <button class="ghost" id="showBoardBtn">أفضل اللاعبين</button>
        </div>
      </div>
    </div>
  </div>

  <div class="center-ui hidden" id="gameOverScreen">
    <div class="panel">
      <h2 class="title">انتهت الجولة</h2>
      <p class="sub" id="finalText">جبت 0 نقطة</p>
      <div class="buttons">
        <button class="secondary" id="restartBtn">إعادة اللعب</button>
        <button class="ghost" id="homeBtn">الصفحة الرئيسية</button>
      </div>
    </div>
  </div>

  <div class="center-ui hidden" id="winScreen">
    <div class="panel">
      <h2 class="title">🎉 فزت بالتحدي!</h2>
      <p class="sub" id="winText">وصلت للهدف</p>
      <div class="buttons">
        <button class="primary" id="playAgainBtn">العب مرة ثانية</button>
        <button class="ghost" id="homeWinBtn">الرئيسية</button>
      </div>
    </div>
  </div>

  <div class="center-ui hidden" id="boardScreen">
    <div class="panel">
      <h2 class="title">🏆 أفضل اللاعبين</h2>
      <div class="leaderboard" id="leaderboardList"></div>
      <div class="buttons" style="margin-top:14px"><button class="ghost" id="closeBoardBtn">رجوع</button></div>
    </div>
  </div>

  <!-- نافذة المهمات الإجبارية -->
  <div class="center-ui hidden" id="taskModal">
    <div class="panel">
      <h2 class="title" id="taskTitle">مهمة جديدة!</h2>
      <p class="sub" id="taskDescription">أكمل المهمة للحصول على محاولات.</p>
      <div class="buttons" style="margin-top:14px">
        <button class="reward" id="taskActionBtn">تنفيذ المهمة</button>
        <button class="ghost" id="closeTaskBtn">إغلاق</button>
      </div>
    </div>
  </div>

</div>

<!-- استيراد مكتبات Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-database.js"></script>

<!-- ربط ملف JavaScript الرئيسي -->
<script src="script.js"></script>
</body>
</html>
