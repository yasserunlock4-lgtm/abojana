<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أبو جنة × فوريو VIP</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#12051f,#24113f);
      color:white;
      text-align:center;
    }

    .container {padding:20px; max-width:500px; margin:auto;}

    .btn {
      background:#ffd54a;
      color:#000;
      padding:12px;
      border:none;
      border-radius:12px;
      margin:6px;
      font-weight:bold;
      cursor:pointer;
      width:100%;
    }

    .hidden {display:none;}

    /* ===== عجلة احترافية ===== */
    .wheel-container{
      position:relative;
      width:260px;
      height:260px;
      margin:20px auto;
    }

    #wheel{
      width:100%;
      height:100%;
      border-radius:50%;
      border:8px solid #fff;
      transition:transform 5s ease-out;
      box-shadow:0 20px 40px rgba(0,0,0,.5);
      background: conic-gradient(
        #ff4b7d 0deg 45deg,
        #ffd54a 45deg 90deg,
        #6ef3ff 90deg 135deg,
        #9b5cff 135deg 180deg,
        #00d68f 180deg 225deg,
        #ff8a00 225deg 270deg,
        #ff4b7d 270deg 315deg,
        #ffd54a 315deg 360deg
      );
    }

    .pointer{
      position:absolute;
      top:-10px;
      left:50%;
      transform:translateX(-50%);
      width:0;height:0;
      border-left:15px solid transparent;
      border-right:15px solid transparent;
      border-bottom:25px solid white;
    }

    /* ===== مهمات ===== */
    .task{
      background:rgba(255,255,255,.1);
      padding:10px;
      border-radius:10px;
      margin:10px 0;
    }

    .task a{
      display:block;
      margin:5px 0;
      color:#ffd54a;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>🔥 أبو جنة × فوريو VIP</h1>

  <!-- الاشتراك -->
  <div id="subscribeBox">
    <p>اشترك بالقناة حتى تبدأ</p>
    <a id="channelLink" href="#" target="_blank" class="btn">فتح القناة</a>
    <button class="btn" onclick="checkSubscribe()">تحققت من الاشتراك</button>
  </div>

  <!-- اللعبة -->
  <div id="gameBox" class="hidden">
    <h2>نقاطك: <span id="points">0</span></h2>

    <div class="wheel-container">
      <div class="pointer"></div>
      <div id="wheel"></div>
    </div>

    <button class="btn" onclick="spinWheel()">لف العجلة 🎰</button>

    <h3>📌 المهمات</h3>
    <div id="tasks"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDiCrZhKVpkYE3HUeeDkAo7xA9I88uZ1i0",
    authDomain: "abojana-3f0c2.firebaseapp.com",
    databaseURL: "https://abojana-3f0c2-default-rtdb.firebaseio.com",
    projectId: "abojana-3f0c2",
    storageBucket: "abojana-3f0c2.firebasestorage.app",
    messagingSenderId: "819681544560",
    appId: "1:819681544560:web:be2249a51d0c79ee21a7b5",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let userId = localStorage.getItem("uid") || Math.random().toString(36).substring(2);
  localStorage.setItem("uid", userId);

  let points = 0;
  let rotation = 0;

  // تحميل النقاط
  db.ref("users/" + userId).on("value", snap => {
    if (snap.exists()) {
      points = snap.val().points || 0;
      document.getElementById("points").innerText = points;
    }
  });

  // القناة
  db.ref("config/channelUrl").on("value", snap => {
    if (snap.exists()) {
      document.getElementById("channelLink").href = snap.val();
    }
  });

  // المهمات
  db.ref("tasks").on("value", snap => {
    const tasks = snap.val() || {};
    let html = "";

    Object.keys(tasks).forEach(id => {
      const t = tasks[id];
      html += `
        <div class="task">
          <b>${t.title}</b>
          <a href="${t.link}" target="_blank">فتح</a>
          <button class="btn" onclick="claimTask('${id}', ${t.reward})">استلام ${t.reward} نقطة</button>
        </div>
      `;
    });

    document.getElementById("tasks").innerHTML = html;
  });

  function claimTask(id, reward){
    points += reward;
    db.ref("users/" + userId).set({ points });
    alert("تم استلام " + reward + " نقطة 🔥");
  }

  function checkSubscribe() {
    document.getElementById("subscribeBox").classList.add("hidden");
    document.getElementById("gameBox").classList.remove("hidden");
  }

  function spinWheel() {
    let rewards = [20,40,60,80,100,150,200,300];
    let index = Math.floor(Math.random() * rewards.length);

    let deg = 360 * 5 + (index * 45);
    rotation += deg;

    document.getElementById("wheel").style.transform = `rotate(${rotation}deg)`;

    setTimeout(()=>{
      let reward = rewards[index];
      points += reward;
      db.ref("users/" + userId).set({ points });
      alert("ربحت " + reward + " نقطة 🎉");
    },5000);
  }
</script>

</body>
</html>
