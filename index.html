<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة القفز والركض</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- حاوية اللعبة الرئيسية -->
    <div class="game-container">
        
        <!-- الجزء العلوي: عرض النتائج -->
        <div class="header">
            <div class="score-box">
                <span>النتيجة</span>
                <span id="score">0</span>
            </div>
            <div class="score-box">
                <span>أفضل رقم</span>
                <span id="high-score">0</span>
            </div>
        </div>

        <!-- لوحة اللعبة: تحتوي على اللاعب والعقبات والأرضية -->
        <div id="game-board">
            <div id="player"></div>
            <!-- سيتم إنشاء العقبات هنا بواسطة JavaScript -->
        </div>

        <!-- قائمة "انتهت الجولة" (مخفية افتراضيًا) -->
        <div id="game-over-menu" class="hidden">
            <div class="menu-content">
                <h2 id="game-over-title">انتهت الجولة</h2>
                <p id="game-over-text">لقد حصلت على <span id="final-score">0</span> نقطة</p>
                <button id="restart-button">🔄 إعادة اللعب</button>
                <button id="missions-button">🎯 المهمات</button>
            </div>
        </div>

        <!-- قائمة "المهمات" (مخفية افتراضيًا) -->
        <div id="missions-modal" class="hidden">
            <div class="menu-content">
                <h2>قائمة المهمات</h2>
                <ul id="missions-list">
                    <!-- سيتم تحميل المهمات هنا من Firebase -->
                </ul>
                <button id="close-missions-button">إغلاق</button>
            </div>
        </div>

    </div>

    <!-- استدعاء ملف JavaScript الرئيسي كوحدة (module) -->
    <script type="module" src="app.js"></script> 

</body>
</html>
