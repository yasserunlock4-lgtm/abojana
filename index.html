<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الدردشة الشخصي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%; max-width: 500px; background: white;
            border-radius: 15px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden; display: flex; flex-direction: column; height: 600px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; text-align: center;
        }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin-bottom: 15px; display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-content {
            max-width: 70%; padding: 12px 15px; border-radius: 15px;
            word-wrap: break-word; font-size: 14px; line-height: 1.4;
        }
        .message.user .message-content { background: #667eea; color: white; border-bottom-right-radius: 5px; }
        .message.bot .message-content { background: #e0e0e0; color: #333; border-bottom-left-radius: 5px; }
        .input-area { padding: 15px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
        .input-area input {
            flex: 1; border: 1px solid #ddd; border-radius: 25px;
            padding: 10px 15px; font-size: 14px; outline: none;
        }
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer;
        }
        .subscription-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .subscription-overlay.active { display: flex; }
        .subscription-modal {
            background: white; border-radius: 15px; padding: 30px; text-align: center;
            max-width: 400px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .subscription-buttons { display: flex; gap: 10px; flex-direction: column; margin-top: 20px; }
        .subscription-buttons button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .subscribe-btn { background: #667eea; color: white; }
        .channel-btn { background: #ff6b6b; color: white; }
        .message-counter { text-align: center; color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🤖 بوت الدردشة</h1><p>مرحباً بك! تحدث معي الآن</p></div>
        <div class="messages-container" id="messagesContainer">
            <div class="message bot"><div class="message-content">مرحباً! 👋 كيف يمكنني مساعدتك اليوم؟</div></div>
        </div>
        <div class="message-counter"><span id="messageCount">0</span> / 5 رسائل مستخدمة</div>
        <div class="input-area" id="inputArea">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <div class="subscription-overlay" id="subscriptionOverlay">
        <div class="subscription-modal">
            <h2>🎉 انتهت الرسائل المجانية!</h2>
            <p>لقد استخدمت 5 رسائل. للمتابعة، يرجى الاشتراك أو متابعة قناتنا.</p>
            <div class="subscription-buttons">
                <button class="subscribe-btn" onclick="location.href='رابط_الاشتراك_هنا'">💳 الاشتراك الآن</button>
                <button class="channel-btn" onclick="location.href='رابط_القناة_هنا'">📢 متابعة القناة</button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageCount = document.getElementById('messageCount');
        const subscriptionOverlay = document.getElementById('subscriptionOverlay');
        
        let userMessageCount = 0;
        const MAX_FREE_MESSAGES = 5;

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || userMessageCount >= MAX_FREE_MESSAGES) return;

            addMessage(message, 'user');
            messageInput.value = '';
            userMessageCount++;
            messageCount.textContent = userMessageCount;

            if (userMessageCount >= MAX_FREE_MESSAGES) {
                setTimeout(() => { subscriptionOverlay.classList.add('active'); }, 500);
            } else {
                setTimeout(() => { addMessage('هذا رد تلقائي من البوت! 😊', 'bot'); }, 500);
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `<div class="message-content">${text}</div>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
