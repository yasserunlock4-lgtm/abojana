<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت أبو جنة - عجلة الحظ</title>
    <link rel="stylesheet" href="style.css">
    <!-- Telegram Web App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div id="subscription-check" class="subscription-overlay">
            <div class="subscription-box">
                <h2>مرحباً بك في عالم أبو جنة!</h2>
                <p>للبدء وربح النقاط، يجب عليك أولاً الاشتراك في القناة الرسمية.</p>
                <a href="https://t.me/YOUR_CHANNEL_NAME" target="_blank" id="subscribe-button" class="button">اشترك الآن</a>
                <button id="check-subscription-button" class="button-secondary">تحققت من الاشتراك</button>
            </div>
        </div>

        <div id="main-content" class="hidden">
            <header>
                <img src="https://via.placeholder.com/80" alt="شعار فور يو" class="logo">
                <h1>عجلة حظ أبو جنة</h1>
                <div class="user-info">
                    <span id="username"></span>
                    <p>نقاطك: <span id="user-points">0</span></p>
                </div>
            </header>

            <main>
                <div class="wheel-container">
                    <div class="wheel" id="wheel">
                        <div class="sector" style="--i:1; --clr:#db7093;"><span>10</span></div>
                        <div class="sector" style="--i:2; --clr:#20b2aa;"><span>50</span></div>
                        <div class="sector" style="--i:3; --clr:#daa520;"><span>20</span></div>
                        <div class="sector" style="--i:4; --clr:#ff340f;"><span>حاول مرة أخرى</span></div>
                        <div class="sector" style="--i:5; --clr:#ff7f50;"><span>100</span></div>
                        <div class="sector" style="--i:6; --clr:#3cb371;"><span>5</span></div>
                        <div class="sector" style="--i:7; --clr:#4169e1;"><span>200</span></div>
                        <div class="sector" style="--i:8; --clr:#6a5acd;"><span>25</span></div>
                    </div>
                    <div class="spin-button" id="spin-btn">لف العجلة</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
