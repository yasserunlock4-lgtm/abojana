<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>لعبة الركض</title>
    <style>
        :root {
            --bg1: #12051f;
            --bg2: #24113f;
            --accent: #ffd54a;
            --accent2: #ff4b7d;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, .12);
            --stroke: rgba(255, 255, 255, .18);
            --shadow: 0 20px 40px rgba(0, 0, 0, .35);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            width: 100%;
            height: 100%;
            background: var(--bg1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Tahoma", "Arial", sans-serif;
            overflow: hidden;
            position: fixed;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 850px;
            margin: 0 auto;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg1), var(--bg2));
            color: var(--white);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        #game-wrapper canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            pointer-events: none;
        }

        .hud-left {
            display: flex;
            gap: 10px;
        }

        .badge {
            background: var(--glass);
            border: 1px solid var(--stroke);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: 16px;
            min-width: 90px;
            text-align: center;
        }

        .badge .label {
            font-size: 11px;
            opacity: .8;
            margin-bottom: 4px;
        }

        .badge .value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .center-ui {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 18px;
            background: rgba(18, 5, 31, 0.5);
        }

        .panel {
            width: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .13), rgba(255, 255, 255, .07));
            border: 1px solid var(--stroke);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            box-shadow: var(--shadow);
            padding: 25px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 10px;
            color: var(--accent);
        }

        .sub {
            margin: 0 0 20px;
            opacity: .9;
            line-height: 1.8;
            font-size: 14px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 18px;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: .18s transform ease;
            font-family: "Tahoma", "Arial", sans-serif;
        }

        button:active {
            transform: scale(.98);
        }

        .primary {
            background: linear-gradient(135deg, var(--accent), #ffb300);
            color: #221400;
        }

        .secondary {
            background: linear-gradient(135deg, var(--accent2), #ff7a47);
            color: #fff;
        }

        .ghost {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--stroke);
        }

        .hidden {
            display: none;
        }

        .tap-zone {
            position: absolute;
            inset: 0;
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- حاوية اللعبة الرئيسية -->
    <div id="game-wrapper">
        <!-- سيتم الرسم هنا -->
        <canvas id="gameCanvas"></canvas>

        <!-- واجهة المستخدم العلوية -->
        <div class="hud">
            <div class="hud-left">
                <div class="badge">
                    <div class="label">النتيجة</div>
                    <div class="value" id="scoreValue">0</div>
                </div>
                <div class="badge">
                    <div class="label">أفضل رقم</div>
                    <div class="value" id="bestValue">0</div>
                </div>
            </div>
        </div>

        <!-- منطقة النقر للقفز -->
        <div class="tap-zone" id="tapZone"></div>

        <!-- شاشة البداية -->
        <div class="center-ui" id="startScreen">
            <div class="panel">
                <h1 class="title">لعبة الركض</h1>
                <p class="sub">اقفز لتجنب العقبات وحقق أعلى نتيجة!</p>
                <div class="buttons">
                    <button class="primary" id="startBtn">ابدأ اللعب</button>
                </div>
            </div>
        </div>

        <!-- شاشة نهاية اللعبة -->
        <div class="center-ui hidden" id="gameOverScreen">
            <div class="panel">
                <h2 class="title">انتهت الجولة</h2>
                <p class="sub" id="finalText">جبت 0 نقطة</p>
                <div class="buttons">
                    <button class="secondary" id="restartBtn">إعادة اللعب</button>
                    <button class="ghost" id="homeBtn">الرئيسية</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- تهيئة العناصر ---
        const wrapper = document.getElementById("game-wrapper");
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const scoreValue = document.getElementById("scoreValue");
        const bestValue = document.getElementById("bestValue");
        const startScreen = document.getElementById("startScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalText = document.getElementById("finalText");
        const tapZone = document.getElementById("tapZone");

        let W = 0, H = 0;
        const DPR = window.devicePixelRatio || 1;

        // --- دالة لضبط حجم الكانفاس ---
        function resizeCanvas() {
            W = wrapper.clientWidth;
            H = wrapper.clientHeight;
            canvas.width = W * DPR;
            canvas.height = H * DPR;
            ctx.scale(DPR, DPR);
        }
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        const groundH = H * 0.15;

        // --- حفظ أفضل نتيجة ---
        let best = +localStorage.getItem("runnerBestScore") || 0;
        bestValue.textContent = best;

        // --- متغيرات اللعبة ---
        const game = {
            running: false,
            over: false,
            score: 0,
            speed: 5.5,
            gravity: 0.8,
            bgOffset: 0,
            spawnTimer: 0,
            pickupTimer: 0,
            obstacles: [],
            pickups: [],
            particles: [],
        };

        const player = {
            x: 80,
            y: 0,
            w: 50,
            h: 70,
            vy: 0,
            jumpPower: -14.5,
            onGround: true,
        };

        // --- دوال التحكم باللعبة ---
        function hideAllMenus() {
            startScreen.classList.add("hidden");
            gameOverScreen.classList.add("hidden");
        }

        function goHome() {
            game.running = false;
            game.over = false;
            hideAllMenus();
            startScreen.classList.remove("hidden");
        }

        function resetGame() {
            game.running = true;
            game.over = false;
            game.score = 0;
            game.speed = 5.5;
            game.spawnTimer = 0;
            game.pickupTimer = 0;
            game.obstacles = [];
            game.pickups = [];
            game.particles = [];
            
            player.y = H - groundH - player.h;
            player.vy = 0;
            player.onGround = true;
            
            scoreValue.textContent = "0";
            hideAllMenus();
        }

        function jump() {
            if (game.running && player.onGround) {
                player.vy = player.jumpPower;
                player.onGround = false;
                makeDust(player.x + player.w * 0.5, player.y + player.h, 8, "#ffffff");
            }
        }

        function endGame() {
            if (game.over) return;
            game.running = false;
            game.over = true;
            
            finalText.textContent = "جبت " + game.score + " نقطة";
            if (game.score > best) {
                best = game.score;
                localStorage.setItem("runnerBestScore", best);
                bestValue.textContent = best;
            }
            gameOverScreen.classList.remove("hidden");
        }

        // --- دوال مساعدة ---
        function rand(a, b) { return Math.random() * (b - a) + a; }
        function rectsCollide(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

        // --- إنشاء العناصر ---
        function spawnObstacle() {
            const h = rand(25, 40);
            game.obstacles.push({
                x: W + 50,
                y: H - groundH - h,
                w: rand(50, 70),
                h: h,
            });
        }

        function spawnPickup() {
            const size = 40;
            game.pickups.push({
                x: W + 50,
                y: H - groundH - size - rand(0, 80),
                w: size,
                h: size * 1.5,
                bob: rand(0, Math.PI * 2)
            });
        }

        function makeDust(x, y, count = 10, color = "#ffd54a") {
            for (let i = 0; i < count; i++) {
                game.particles.push({
                    x, y,
                    vx: rand(-2.5, 2.5),
                    vy: rand(-3.5, -0.5),
                    r: rand(2, 5),
                    a: 1,
                    color
                });
            }
        }

        // --- التحديث المستمر للعبة ---
        function update() {
            if (!game.running) return;

            game.bgOffset += game.speed * 0.6;
            game.speed += 0.001;

            player.vy += game.gravity;
            player.y += player.vy;

            const floorY = H - groundH - player.h;
            if (player.y >= floorY) {
                if (!player.onGround && player.vy > 4) {
                    makeDust(player.x + player.w * 0.5, H - groundH, 8, "#ffd54a");
                }
                player.y = floorY;
                player.vy = 0;
                player.onGround = true;
            }

            game.spawnTimer++;
            game.pickupTimer++;
            if (game.spawnTimer > rand(70, 100)) {
                spawnObstacle();
                game.spawnTimer = 0;
            }
            if (game.pickupTimer > rand(60, 90)) {
                spawnPickup();
                game.pickupTimer = 0;
            }

            for (let i = game.obstacles.length - 1; i >= 0; i--) {
                const o = game.obstacles[i];
                o.x -= game.speed;
                if (rectsCollide({ ...player, y: player.y + 5, h: player.h - 5 }, o)) {
                    endGame();
                }
                if (o.x + o.w < 0) game.obstacles.splice(i, 1);
            }

            for (let i = game.pickups.length - 1; i >= 0; i--) {
                const p = game.pickups[i];
                p.x -= game.speed;
                p.bob += 0.08;
                if (rectsCollide(player, p)) {
                    game.score++;
                    scoreValue.textContent = game.score;
                    makeDust(p.x + p.w / 2, p.y + p.h / 2, 12, "#34d399");
                    game.pickups.splice(i, 1);
                    continue;
                }
                if (p.x + p.w < 0) game.pickups.splice(i, 1);
            }

            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.a -= 0.03;
                if (p.a <= 0) game.particles.splice(i, 1);
            }
        }

        // --- دوال الرسم ---
        function drawBackground() {
            for (let i = 0; i < 15; i++) {
                const x = ((i * 170) - (game.bgOffset * (0.1 + i * 0.005))) % (W + 200);
                const y = 40 + (i * 37) % (H * 0.6);
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${rand(0.05, 0.15)})`;
                ctx.arc(x, y, rand(0.5, 1.5), 0, Math.PI * 2);
                ctx.fill();
            }
            for (let i = 0; i < 8; i++) {
                const bx = ((i * 220) - game.bgOffset * 0.4) % (W + 260) - 120;
                const bw = 70 + (i % 3) * 25;
                const bh = 100 + (i * 23 % 150);
                const by = H - groundH - bh;
                ctx.fillStyle = "rgba(255, 255, 255, .04)";
                ctx.fillRect(bx, by, bw, bh);
            }
        }

        function drawGround() {
            const gy = H - groundH;
            const grd = ctx.createLinearGradient(0, gy, 0, H);
            grd.addColorStop(0, "#4b2a18");
            grd.addColorStop(1, "#25160e");
            ctx.fillStyle = grd;
            ctx.fillRect(0, gy, W, groundH);
            for (let i = 0; i < Math.ceil(W / 45) + 2; i++) {
                const x = (i * 45 - (game.bgOffset * 1.5) % 45) - 10;
                ctx.fillStyle = "rgba(255, 255, 255, .06)";
                ctx.fillRect(x, gy + groundH * 0.7, 24, 4);
            }
        }

        function drawPlayer() {
            const { x, y, w, h } = player;
            ctx.beginPath();
            ctx.fillStyle = "rgba(0, 0, 0, .2)";
            ctx.ellipse(x + w / 2, H - groundH + 5, w * 0.3, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#101827";
            ctx.fillRect(x, y + h * 0.3, w, h * 0.7);
            ctx.fillStyle = "#ffb703";
            ctx.fillRect(x, y + h * 0.3, w, h * 0.35);
            ctx.fillStyle = "#231200";
            ctx.font = `bold ${w * 0.25}px Tahoma`;
            ctx.textAlign = "center";
            ctx.fillText("AJ", x + w / 2, y + h * 0.55);
            ctx.fillStyle = "#f3c89d";
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h * 0.18, w * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#2a1b12";
            ctx.beginPath();
            ctx.arc(x + w / 2, y + h * 0.15, w * 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#2a1b12";
            ctx.beginPath();
            ctx.arc(x + w * 0.35, y + h * 0.2, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + w * 0.65, y + h * 0.2, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawObstacles() {
            for (const o of game.obstacles) {
                ctx.beginPath();
                ctx.fillStyle = "rgba(0, 0, 0, .2)";
                ctx.ellipse(o.x + o.w / 2, H - groundH + 5, o.w * 0.4, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#ff4b7d";
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.fillStyle = "#ffd54a";
                for (let i = 0; i < 4; i++) {
                    ctx.save();
                    ctx.translate(o.x + 10 + i * (o.w / 4.5), o.y + o.h * 0.8);
                    ctx.rotate(-0.7);
                    ctx.fillRect(0, 0, 8, o.h * 0.6);
                    ctx.restore();
                }
            }
        }

        function drawPickups() {
            for (const p of game.pickups) {
                const y = p.y + Math.sin(p.bob) * 4;
                const glow = ctx.createRadialGradient(p.x + p.w / 2, y + p.h / 2, 5, p.x + p.w / 2, y + p.h / 2, p.w * 1.2);
                glow.addColorStop(0, "rgba(52, 211, 153, .25)");
                glow.addColorStop(1, "rgba(52, 211, 153, 0)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x + p.w / 2, y + p.h / 2, p.w * 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#13d38f";
                ctx.fillRect(p.x, y, p.w, p.h);
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.font = `bold ${p.w * 0.4}px Tahoma`;
                ctx.textAlign = "center";
                ctx.fillText("4U", p.x + p.w / 2, y + p.h / 2 + 5);
            }
        }

        function drawParticles() {
            for (const p of game.particles) {
                ctx.globalAlpha = p.a;
                ctx.beginPath();
                ctx.fillStyle = p.color;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function render() {
            ctx.clearRect(0, 0, W, H);
            drawBackground();
            drawGround();
            if (game.running || game.over) {
                drawPlayer();
                drawObstacles();
                drawPickups();
                drawParticles();
            }
        }

        // --- حلقة اللعبة الرئيسية وربط الأحداث ---
        function loop() { requestAnimationFrame(loop); update(); render(); }
        loop();

        document.getElementById("startBtn").addEventListener("click", resetGame);
        document.getElementById("restartBtn").addEventListener("click", resetGame);
        document.getElementById("homeBtn").addEventListener("click", goHome);
        tapZone.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
        tapZone.addEventListener("mousedown", (e) => { e.preventDefault(); jump(); });
        window.addEventListener("keydown", (e) => { if (e.code === "Space") { e.preventDefault(); jump(); } });
    </script>
</body>
</html>
