<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الدردشة الشخصي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 15px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-content {
            background: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .subscription-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .subscription-overlay.active {
            display: flex;
        }

        .subscription-modal {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subscription-modal h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .subscription-modal p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .subscription-buttons {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .subscription-buttons button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .subscribe-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .subscribe-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .channel-btn {
            background: #ff6b6b;
            color: white;
        }

        .channel-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .close-modal-btn {
            background: #e0e0e0;
            color: #333;
            margin-top: 10px;
        }

        .close-modal-btn:hover {
            background: #d0d0d0;
        }

        .message-counter {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
        }

        .disabled-input {
            opacity: 0.5;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 بوت الدردشة</h1>
            <p>مرحباً بك! تحدث معي الآن</p>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message bot">
                <div class="message-content">
                    مرحباً! 👋 أنا بوتك الشخصي. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>

        <div class="message-counter">
            <span id="messageCount">0</span> / 5 رسائل مستخدمة
        </div>

        <div class="input-area" id="inputArea">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="اكتب رسالتك هنا..." 
                autocomplete="off"
            >
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <div class="subscription-overlay" id="subscriptionOverlay">
        <div class="subscription-modal">
            <h2>🎉 لقد وصلت إلى الحد الأقصى!</h2>
            <p>لقد استخدمت جميع رسائلك المجانية (5 رسائل). للمتابعة والحصول على رسائل غير محدودة، يرجى الاشتراك أو متابعة قناتنا.</p>
            <div class="subscription-buttons">
                <button class="subscribe-btn" onclick="handleSubscribe()">
                    💳 الاشتراك الآن
                </button>
                <button class="channel-btn" onclick="handleChannel()">
                    📢 متابعة القناة
                </button>
                <button class="close-modal-btn" onclick="closeSubscriptionModal()">
                    إغلاق
                </button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageCount = document.getElementById('messageCount');
        const subscriptionOverlay = document.getElementById('subscriptionOverlay');
        const inputArea = document.getElementById('inputArea');

        let userMessageCount = 0;
        const MAX_FREE_MESSAGES = 5;

        // قائمة الردود الآلية للبوت
        const botResponses = [
            'هذا رد تلقائي رائع! 😊',
            'شكراً لرسالتك، أنا هنا للمساعدة! 💪',
            'معك حق تماماً! 👍',
            'هذا موضوع مثير للاهتمام! 🤔',
            'أنا أتفق معك تماماً! ✨',
            'شكراً على هذه المعلومة القيمة! 📚',
            'رائع جداً! هل تريد معرفة المزيد؟ 🚀',
            'أنا هنا لدعمك دائماً! 💖'
        ];

        // إرسال الرسالة عند الضغط على الزر
        sendBtn.addEventListener('click', sendMessage);

        // إرسال الرسالة عند الضغط على Enter
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && messageInput.value.trim()) {
                sendMessage();
            }
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            
            if (!message) return;

            // التحقق من الحد الأقصى للرسائل
            if (userMessageCount >= MAX_FREE_MESSAGES) {
                showSubscriptionModal();
                messageInput.value = '';
                return;
            }

            // إضافة رسالة المستخدم
            addMessage(message, 'user');
            messageInput.value = '';
            userMessageCount++;
            updateMessageCount();

            // التحقق من الوصول للحد الأقصى
            if (userMessageCount >= MAX_FREE_MESSAGES) {
                setTimeout(() => {
                    addMessage('لقد وصلت إلى حد رسائلك المجانية! للمتابعة، يرجى الاشتراك أو متابعة قناتنا. 📢', 'bot');
                    showSubscriptionModal();
                }, 500);
                return;
            }

            // رد البوت التلقائي
            setTimeout(() => {
                const randomResponse = botResponses[Math.floor(Math.random() * botResponses.length)];
                addMessage(randomResponse, 'bot');
            }, 500);
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // التمرير للأسفل تلقائياً
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function updateMessageCount() {
            messageCount.textContent = userMessageCount;
        }

        function showSubscriptionModal() {
            subscriptionOverlay.classList.add('active');
            inputArea.classList.add('disabled-input');
            sendBtn.disabled = true;
        }

        function closeSubscriptionModal() {
            subscriptionOverlay.classList.remove('active');
        }

        function handleSubscribe() {
            alert('شكراً لاهتمامك! يرجى التواصل معنا للاشتراك.\nالبريد الإلكتروني: support@example.com');
            closeSubscriptionModal();
        }

        function handleChannel() {
            alert('شكراً! يرجى متابعة قناتنا على:\nhttps://t.me/yourchannel\nأو\nhttps://youtube.com/@yourchannel');
            closeSubscriptionModal();
        }

        // التركيز على حقل الإدخال عند تحميل الصفحة
        messageInput.focus();
    </script>
</body>
</html>
